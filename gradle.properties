#gralde build config
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.jvmargs=-Xmx4608M

#use androidX
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false

#去掉资源重复检查
android.disableResourceValidation=true

#build config
ANDROID_MIN_SDK_VERSION=24
ANDROID_TARGET_SDK_VERSION=35
ANDROID_COMPILE_SDK_VERSION=35
KOTLIN_VERSION = 2.1.0
NDK_VERSION = 21.4.7075529

#msdk api key
AIRCRAFT_API_KEY = Please add your app key here.

#map key
GMAP_API_KEY =  ENTER YOUR Google Map API KEY
MAPLIBRE_TOKEN = ENTER YOUR  MapLibre TOKEN


#签名信息（请自行生成 keystore 或使用 Android 默认 debug keystore）
STORE_FILE = ../msdkkeystore.jks
STORE_PASSWORD = YOUR_STORE_PASSWORD
KEY_ALIAS = msdkkeystore
KEY_PASSWORD = YOUR_KEY_PASSWORD

#maven
KOTLIN_MAVEN = https://dl.bintray.com/kotlin/kotlin-eap
REPO_MAVEN2 = https://repo1.maven.org/maven2
JITPACK_MAVEN_URL = https://jitpack.io